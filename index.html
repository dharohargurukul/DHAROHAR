<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharohar | Spin & Win</title>
    <style>
        :root {
            --brand-brown: #5D4037;
            --brand-gold: #D4AF37;
            --bg-cream: #FDFBF7;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-cream);
            font-family: 'serif';
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #ddd;
        }

        .brand-logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--brand-gold);
            margin-bottom: 25px;
            display: block;
            font-weight: bold;
        }

        .wheel-box {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 0 auto;
            perspective: 1000px;
        }

        .wheel-box::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 25px;
            background: #FF0000;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            border: 8px solid var(--brand-brown);
            transform-style: preserve-3d;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.3),
                inset 0 0 20px rgba(0,0,0,0.2);
            transition: transform 0.1s ease-out;
        }

        #wheel.spinning {
            animation: wheelGlow 4s ease-in-out;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        #wheel:not(.spinning) {
            transition: transform 0.1s ease-out;
        }

        @keyframes wheelGlow {
            0%, 100% { 
                box-shadow: 
                    0 10px 40px rgba(0,0,0,0.3),
                    inset 0 0 20px rgba(0,0,0,0.2);
            }
            50% { 
                box-shadow: 
                    0 15px 60px rgba(212, 175, 55, 0.4),
                    inset 0 0 30px rgba(212, 175, 55, 0.3);
            }
        }

        @keyframes logoPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
            }
            50% { 
                filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8));
            }
        }

        .wheel-box::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 5;
            animation: logoPulse 2s ease-in-out infinite;
        }

        #spin-btn {
            margin-top: 30px;
            background: var(--brand-brown);
            color: white;
            border: 2px solid var(--brand-gold);
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: bold;
        }

        #coupon-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border: 2px dashed var(--brand-gold);
            background: #FFF9C4;
            border-radius: 10px;
            cursor: pointer;
        }

        .coupon-code {
            font-size: 26px;
            font-weight: bold;
            display: block;
            margin: 10px 0;
            color: #D32F2F;
        }

        .copy-text { font-size: 10px; color: #888; }
    </style>
</head>
<body>

    <span class="subtitle">Spin & Win Rewards</span>
    
    <div class="wheel-box">
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <button id="spin-btn">Spin to Win</button>

    <div id="coupon-box" onclick="copyToClipboard()">
        <span style="font-weight: bold; font-size: 12px;">CONGRATULATIONS! YOU WON:</span>
        <span class="coupon-code" id="code-display"></span>
        <small id="sub-text" style="display:block; margin-bottom: 5px;"></small>
        <span class="copy-text">CLICK TO COPY CODE</span>
    </div>
</div>
